# 校园二手交易小程序 — nginx 反向代理配置模板
#
# 适用场景：Express 监听 127.0.0.1:3000，nginx 对外暴露 80/443
# 部署路径：/etc/nginx/sites-available/campus-market.conf
#
# 使用方式：
#   cp server/nginx.conf /etc/nginx/sites-available/campus-market.conf
#   ln -s /etc/nginx/sites-available/campus-market.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d <你的域名>

# ── HTTPS 主服务 ──
server {
    listen 443 ssl http2;
    server_name <你的域名>;

    # SSL 证书（certbot 自动管理，替换为实际路径）
    ssl_certificate     /etc/letsencrypt/live/<域名>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<域名>/privkey.pem;

    # 安全头
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 静态资源（COS 直传后回源）
    location /images/ {
        alias /opt/campus-market/server/public/images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    # 健康检查（不记录访问日志，减少噪音）
    location = /api/health {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
    }

    # 请求体大小限制（API 不接收文件上传，防止大 body 攻击）
    client_max_body_size 10m;
}

# ── HTTP → HTTPS 重定向 ──
server {
    listen 80;
    server_name <你的域名>;
    return 301 https://$host$request_uri;
}
