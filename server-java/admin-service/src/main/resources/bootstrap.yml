# Nacos 配置中心（bootstrap.yml 先于 application.yml 加载）
spring:
  cloud:
    nacos:
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        file-extension: yaml
        group: DEFAULT_GROUP
        shared-configs:
          - data-id: shm-common.yaml
            group: DEFAULT_GROUP
            refresh: true
