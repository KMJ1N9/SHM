server:
  port: 8082

spring:
  application:
    name: admin-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/campus_market_dev?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 5000
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
  flyway:
    enabled: false

# JWT 密钥（与 core-service 共用同一套密钥，可通过 Nacos 配置中心统一管理）
jwt:
  access-secret: ${JWT_ACCESS_SECRET}
  refresh-secret: ${JWT_REFRESH_SECRET}

# 信誉分配置（与 core-service CreditProperties 默认值一致，可通过 Nacos 统一管理）
credit:
  max: ${CREDIT_MAX:200}

# ============================================================
# 管理员自动提升 — 手机号白名单（逗号分隔），与 core-service 一致
# 匹配的手机号在首次访问管理后台时自动提升为 admin 角色
# ============================================================
admin:
  auto-phones: ${ADMIN_AUTO_PHONES:}

# ============================================================
# 内部 API 共享密钥（与 im-connector 一致）
# 通过 Feign RequestInterceptor 注入 X-Internal-Token 请求头
# ============================================================
internal:
  token: ${INTERNAL_TOKEN:}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.shm.common.model.entity
  configuration:
    map-underscore-to-camel-case: true

# ── Sentinel 熔断 (Phase 9 + Phase 17 补全) ──
spring.cloud.sentinel:
  transport:
    dashboard: ${SENTINEL_DASHBOARD:localhost:8088}
    port: 8722
    client-ip: 127.0.0.1
  eager: true
  # 启用 Web MVC 拦截器（Phase 17: 使 SentinelOriginConfig 生效）
  filter:
    enabled: true
  datasource:
    flow:
      nacos:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        data-id: sentinel-admin-flow-rules
        group-id: DEFAULT_GROUP
        data-type: json
        rule-type: flow
    degrade:
      nacos:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        data-id: sentinel-admin-degrade-rules
        group-id: DEFAULT_GROUP
        data-type: json
        rule-type: degrade
    # 授权规则（Phase 17: admin 白名单）
    authority:
      nacos:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        data-id: sentinel-admin-auth-rules
        group-id: DEFAULT_GROUP
        data-type: json
        rule-type: authority

# ── SpringDoc OpenAPI (Phase 12) ──
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false
  default-produces-media-type: application/json

# Feign + Sentinel 熔断 (Phase 9)
feign:
  sentinel:
    enabled: true

# ── Seata 分布式事务 (Phase 13) ──
seata:
  enabled: ${SEATA_ENABLED:false}
  tx-service-group: shm-tx-group
  enable-auto-data-source-proxy: true
  registry:
    type: file
  config:
    type: file
  service:
    vgroup-mapping:
      shm-tx-group: default
    grouplist:
      default: ${SEATA_SERVER_ADDR:127.0.0.1:8091}
  client:
    rm:
      report-success-enable: false
    tm:
      degrade-check-allow-times: 10

# ── RocketMQ 消息驱动 (Phase 14) ──
rocketmq:
  enabled: ${ROCKETMQ_ENABLED:false}
  name-server: ${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
  producer:
    group: ${ROCKETMQ_PRODUCER_GROUP:shm-admin-producer}
  consumer:
    group: ${ROCKETMQ_CONSUMER_GROUP:shm-admin-consumer}

# ── 全链路追踪（Phase 15）+ 监控指标（Prometheus）──
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
