server:
  port: 8081

spring:
  profiles:
    active: dev
  application:
    name: core-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        # 临时禁用 Nacos 发现（本地开发无需 Nacos 时启用）
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/campus_market_dev?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 5000
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    table: flyway_schema_history

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.shm.common.model.entity
  configuration:
    map-underscore-to-camel-case: true

# ============================================================
# JWT 配置（与 Node.js 一致）
# 敏感值通过环境变量注入，或通过 Nacos 配置中心管理
# ============================================================
jwt:
  access-secret: ${JWT_ACCESS_SECRET}
  refresh-secret: ${JWT_REFRESH_SECRET}

# ============================================================
# 信誉分配置（与 Node.js config/credit.js 一致，支持运维调参）
# ============================================================
credit:
  max: 200
  publish-threshold: 60
  trade-threshold: 30
  reward-transaction: 2
  reward-positive: 1
  deduct-negative: -5

# ============================================================
# 微信小程序配置
# 敏感值通过环境变量注入，或通过 Nacos 配置中心管理
# ============================================================
# ============================================================
# 内部 API 共享密钥（与 im-connector 一致）
# 通过 Feign RequestInterceptor 注入 X-Internal-Token 请求头
# ============================================================
internal:
  token: ${INTERNAL_TOKEN:}

# ============================================================
# 管理员自动提升 — 手机号白名单（逗号分隔），匹配的手机号登录时自动提升为 admin
# ============================================================
admin:
  auto-phones: ${ADMIN_AUTO_PHONES:}

app:
  wechat:
    app-id: ${WX_APP_ID}
    app-secret: ${WX_APP_SECRET}

# ── Redis 缓存 (Phase 10) ──
spring.data.redis:
  host: ${REDIS_HOST:127.0.0.1}
  port: ${REDIS_PORT:6379}
  lettuce:
    pool:
      max-active: 8
      max-idle: 8
      min-idle: 2
      max-wait: 3000ms

# ── Sentinel 流控 + 熔断 (Phase 9) ──
spring.cloud.sentinel:
  transport:
    dashboard: ${SENTINEL_DASHBOARD:localhost:8088}
    port: 8721
    client-ip: 127.0.0.1
  eager: true
  datasource:
    flow-rules:
      nacos:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        data-id: sentinel-core-flow-rules
        group-id: DEFAULT_GROUP
        data-type: json
        rule-type: flow
    degrade-rules:
      nacos:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        data-id: sentinel-core-degrade-rules
        group-id: DEFAULT_GROUP
        data-type: json
        rule-type: degrade
    # 热点参数限流规则（Phase 17: 单商品QPS≤20等）
    param-flow:
      nacos:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        data-id: sentinel-core-param-flow-rules
        group-id: DEFAULT_GROUP
        data-type: json
        rule-type: param-flow
    # 授权规则（Phase 17: admin 白名单）
    authority:
      nacos:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        data-id: sentinel-core-auth-rules
        group-id: DEFAULT_GROUP
        data-type: json
        rule-type: authority

# ── SpringDoc OpenAPI (Phase 12) ──
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false
  default-produces-media-type: application/json

# Feign + Sentinel 熔断 (Phase 9)
feign:
  sentinel:
    enabled: true

# ── Seata 分布式事务 (Phase 13) ──
seata:
  enabled: ${SEATA_ENABLED:false}
  tx-service-group: shm-tx-group
  enable-auto-data-source-proxy: true
  registry:
    type: file
  config:
    type: file
  service:
    vgroup-mapping:
      shm-tx-group: default
    grouplist:
      default: ${SEATA_SERVER_ADDR:127.0.0.1:8091}
  client:
    rm:
      report-success-enable: false
    tm:
      degrade-check-allow-times: 10

# ── RocketMQ 消息驱动 (Phase 14) ──
rocketmq:
  enabled: ${ROCKETMQ_ENABLED:false}
  name-server: ${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
  producer:
    group: ${ROCKETMQ_PRODUCER_GROUP:shm-core-producer}
  consumer:
    group: ${ROCKETMQ_CONSUMER_GROUP:shm-core-consumer}

# ── 全链路追踪（Phase 15）+ 监控指标（Prometheus）──
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
