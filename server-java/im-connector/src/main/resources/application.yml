server:
  port: 8083

spring:
  application:
    name: im-connector
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        enabled: ${NACOS_DISCOVERY_ENABLED:true}

# ============================================================
# 腾讯云 IM 配置（与 Node.js config/im 一致）
# 敏感值通过环境变量注入，或通过 Nacos 配置中心管理
# ============================================================
tencent:
  im:
    sdk-app-id: ${IM_SDK_APP_ID:0}
    secret-key: ${IM_SECRET_KEY:}
    admin-account: ${IM_ADMIN_ACCOUNT:administrator}
  cos:
    bucket: ${COS_BUCKET:}
    region: ${COS_REGION:ap-guangzhou}
    secret-id: ${COS_SECRET_ID:}
    secret-key: ${COS_SECRET_KEY:}
    mock: ${COS_MOCK:false}
    cdn-base-url: ${COS_CDN_BASE_URL:}
    upload-max-size: ${COS_UPLOAD_MAX_SIZE:5242880}
    duration-seconds: 1800

# ============================================================
# 图片存储路径 — 开发环境服务端文件存储
# 与 Node.js server/public/images 行为一致
# 使用相对路径，基于 server-java/ 工作目录解析
# ============================================================
image:
  storage:
    path: ${IMAGE_STORAGE_PATH:}

# ── 文件上传限制（Spring Boot 默认 1MB，调大为 10MB） ──
spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 10MB

# ── SpringDoc OpenAPI (Phase 12) ──
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false
  default-produces-media-type: application/json

# ============================================================
# 内部 API 共享密钥（defense-in-depth）
# 本地开发留空 = 拦截器放行；生产环境通过 INTERNAL_TOKEN 环境变量注入
# 调用方（core-service / admin-service）需配置相同值
# ============================================================
internal:
  token: ${INTERNAL_TOKEN:}
